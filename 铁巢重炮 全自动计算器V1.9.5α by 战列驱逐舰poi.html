<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁巢重炮：分布式链式火控及战术应急终端 V1.9.5</title>
    <style>
        :root {
            --bg-color: #0b0f19; --card-bg: #131c2e; --text-main: #f1f5f9;
            --text-muted: #64748b; --accent: #f59e0b; --border: #1e293b;
            --gun-color: #38bdf8; --target-color: #ef4444; --spotter-color: #c084fc; --ref-color: #34d399;
        }
        body { font-family: Menlo, Monaco, Consolas, "Courier New", monospace; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1500px; margin: 0 auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        header { text-align: center; border-bottom: 2px dashed var(--border); padding-bottom: 15px; margin-bottom: 15px; }
        header h1 { color: var(--accent); margin: 0; font-size: 24px; letter-spacing: 2px; }
        .main-layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }

        .radar-box { display: flex; flex-direction: column; gap: 15px; position: sticky; top: 15px; }
        #canvas-container { position: relative; background: #030712; border: 2px solid #1e293b; border-radius: 6px; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
        .map-hint { position: absolute; bottom: 5px; right: 8px; font-size: 10px; color: var(--text-muted); pointer-events: none; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; }

        .manual-override-box { background: #090d16; border: 1px solid #1e293b; border-radius: 6px; padding: 12px; width: 100%; box-sizing: border-box; }
        .manual-override-box h3 { margin: 0 0 10px 0; font-size: 13px; color: var(--accent); border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .manual-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; font-size: 12px; }
        .manual-row label { width: 75px; color: var(--text-muted); }
        .manual-row input, .manual-row select { flex: 1; min-width: 0; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 4px; padding: 3px; }
        .btn-override { background: #2563eb; color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; width: 100%; margin-top: 5px; }

        .control-panel { display: flex; flex-direction: column; gap: 15px; }
        .clipboard-sec { background: #070a13; border: 1px solid #334155; border-radius: 6px; padding: 14px; }
        .clipboard-sec textarea { width: 100%; height: 200px; background: transparent; border: none; color: #34d399; font-family: inherit; font-size: 13px; line-height: 1.6; resize: vertical; outline: none; }
        
        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
        .node-card { background: #0f172a; border-left: 4px solid var(--border); padding: 10px; border-radius: 4px; font-size: 13px; }
        .node-card.gun { border-left-color: var(--gun-color); }
        .node-card.spotter { border-left-color: var(--spotter-color); }
        .node-card.ref { border-left-color: var(--ref-color); }
        .node-card.tgt { border-left-color: var(--target-color); }
        .node-title { font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        .terminal-output { background: #020617; border: 1px solid #1e293b; border-radius: 6px; padding: 15px; }
        .target-selector-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; font-size: 14px; background: #0f172a; padding: 8px; border-radius: 4px; }
        .gun-cards-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gun-card { padding: 15px; border-radius: 6px; color: #fff; }
        .gun-card.left { background: linear-gradient(135deg, #1e3a8a, #1d4ed8); }
        .gun-card.right { background: linear-gradient(135deg, #064e3b, #047857); }
        .fire-num { font-size: 26px; font-weight: bold; margin: 5px 0; letter-spacing: 1px; }
        .charge-bar { display: flex; justify-content: space-between; font-size: 11px; margin-top: 8px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; }
        .charge-bar label { cursor: pointer; display: flex; align-items: center; gap: 2px; }

        .slots-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 5px; }
        .slots-box { background: #0f172a; border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
        .slots-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        .slots-table th, .slots-table td { border: 1px solid #1e293b; padding: 6px 4px; }
        .btn-slot { background: #1e293b; border: 1px solid #334155; color: #fff; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-slot:hover { background: var(--accent); color: #000; }
        
        .blind-sec { border: 1px dashed var(--accent); background: #1a1510; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; }
        .decision-btn-group { display: flex; gap: 4px; margin-top: 6px; }
        .btn-decision { flex: 1; font-size: 11px; padding: 4px; border: 1px solid #334155; background: #1e293b; color: #cbd5e1; cursor: pointer; }
        .btn-decision.active { background: var(--accent); color: #000; font-weight: bold; }
        footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 12px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>铁巢重炮：分布式链式火控及战术应急终端 V1.9.5</h1></header>

    <div class="main-layout">
        <div class="radar-box">
            <div id="canvas-container">
                <canvas id="radarCanvas" width="380" height="380"></canvas>
                <div class="map-hint">滚轮:缩放 | 左键:拖动</div>
            </div>
            
            <div class="manual-override-box">
                <h3>🚨 战术应急手动坐标输入面板</h3>
                <div class="manual-row"><textarea id="manual-smart-parse" style="width:100%; height:40px; background:#0f172a; border:1px solid #334155; color:#34d399; font-size:11px;" placeholder="在此直接粘贴单条情报(如: Tgt#9: R3 5:2)..."></textarea></div>
                <div class="manual-row">
                    <label>资产类型:</label>
                    <select id="manual-type">
                        <option value="spotter">观测资产 (Spotter)</option>
                        <option value="ref">参考点 (Alpha/Beta等)</option>
                        <option value="target">直导目标 (Target)</option>
                    </select>
                </div>
                <div class="manual-row">
                    <label>资产代号:</label>
                    <input type="text" id="manual-id" placeholder="例如: Spotter1 或 Alpha" style="color:var(--accent); font-weight:bold;">
                </div>
                <div class="manual-row">
                    <label>输入格式:</label>
                    <select id="manual-format" onchange="toggleManualInputs()">
                        <option value="grid">游戏网格格式 (如 G8 3:3)</option>
                        <option value="km">公里绝对坐标 (X, Y)</option>
                        <option value="polar">半自动三角测距(多点碎片输入)</option>
                    </select>
                </div>
                <div id="manual-grid-inputs">
                    <div class="manual-row"><label>网格坐标:</label><input type="text" id="manual-grid-str" placeholder="G8 3:3"></div>
                </div>
                <div id="manual-km-inputs" style="display:none;">
                    <div class="manual-row">
                        <label>X (km):</label><input type="number" id="manual-km-x" step="0.01">
                        <label>Y (km):</label><input type="number" id="manual-km-y" step="0.01">
                    </div>
                </div>
                <div id="manual-polar-inputs" style="display:none; background: #070a13; border: 1px dashed #334155; padding: 8px; border-radius: 4px;">
                    <div id="polar-bases-container"></div>
                    <button class="btn-override" style="background:#1e293b; border:1px solid #334155; color:#cbd5e1;" onclick="addPolarBase()">➕ 添加测距基准点</button>
                </div>
                <button class="btn-override" onclick="injectManualAsset()">⚡ 强行向火控网注入该资产</button>
            </div>
        </div>

        <div class="control-panel">
            <div class="clipboard-sec">
                <div style="font-size:14px; font-weight:bold; color:#34d399; margin-bottom:5px;">📥 战术情报剪贴板秒读区（解析引擎已冻结保持完美状态）</div>
                <textarea id="clipboard-textarea" placeholder="在此粘贴包含铁巢、观测哨、交会线索的原始情报文本..."></textarea>
            </div>

            <div class="grid-dashboard" id="dashboard-container"></div>

            <div class="terminal-output">
                <div class="target-selector-row">
                    <strong>🎯 火控锁定目标:</strong>
                    <select id="target-selector" style="font-size:13px; background:#1e3a8a; color:var(--accent); font-weight:bold; width:220px;"></select>
                    <span id="target-grid-label" style="font-weight:bold; color:var(--target-color); margin-left:10px;">--</span>
                </div>

                <div class="gun-cards-container">
                    <div class="gun-card left">
                        <div style="display:flex; justify-content:space-between; font-size:12px;"><span>◀ 左重炮实时诸元</span><span id="L-mode-tag" style="font-weight:bold;color:#f59e0b;"></span></div>
                        <div class="fire-num" id="L-elevation">--°</div>
                        <div class="fire-num" id="L-azimuth" style="font-size:18px;">方位: --°</div>
                        <div style="font-size:11px; opacity:0.8;" id="L-distance">测距: -- km</div>
                        <select id="L-ammo-select" style="width:100%; margin-top:8px; background:#1e3a8a; color:white; font-size:12px;">
                            <option value="AP (穿甲弹)">AP (穿甲弹)</option><option value="HE (高爆弹)">HE (高爆弹)</option><option value="HCHE (高装药爆破弹)">HCHE (高装药爆破弹)</option><option value="SMOKE (白磷烟雾弹)">SMOKE (白磷烟雾弹)</option><option value="STAR (照明星弹)">STAR (照明星弹)</option>
                        </select>
                        <div class="charge-bar">
                            <label><input type="radio" name="L-chg" value="0" checked>自动</label>
                            <label><input type="radio" name="L-chg" value="1">1</label><label><input type="radio" name="L-chg" value="2">2</label><label><input type="radio" name="L-chg" value="3">3</label><label><input type="radio" name="L-chg" value="4">4</label><label><input type="radio" name="L-chg" value="5">5</label><label><input type="radio" name="L-chg" value="6">6</label>
                        </div>
                    </div>
                    <div class="gun-card right">
                        <div style="display:flex; justify-content:space-between; font-size:12px;"><span>▶ 右重炮实时诸元</span><span id="R-mode-tag" style="font-weight:bold;color:#f59e0b;"></span></div>
                        <div class="fire-num" id="R-elevation">--°</div>
                        <div class="fire-num" id="R-azimuth" style="font-size:18px;">方位: --°</div>
                        <div id="R-distance" style="font-size:11px; opacity:0.8;" id="R-distance">测距: -- km</div>
                        <select id="R-ammo-select" style="width:100%; margin-top:8px; background:#064e3b; color:white; font-size:12px;">
                            <option value="AP (穿甲弹)">AP (穿甲弹)</option><option value="HE (高爆弹)">HE (高爆弹)</option><option value="HCHE (高装药爆破弹)">HCHE (高装药爆破弹)</option><option value="SMOKE (白磷烟雾弹)">SMOKE (白磷烟雾弹)</option><option value="STAR (照明星弹)">STAR (照明星弹)</option>
                        </select>
                        <div class="charge-bar">
                            <label><input type="radio" name="R-chg" value="0" checked>自动</label>
                            <label><input type="radio" name="R-chg" value="1">1</label><label><input type="radio" name="R-chg" value="2">2</label><label><input type="radio" name="R-chg" value="3">3</label><label><input type="radio" name="R-chg" value="4">4</label><label><input type="radio" name="R-chg" value="5">5</label><label><input type="radio" name="R-chg" value="6">6</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="slots-section">
                <div class="slots-box" style="border-top:3px solid var(--gun-color);">
                    <h3 style="color:var(--gun-color);">◀ 左炮计划</h3>
                    <table class="slots-table"><thead><tr><th>卡槽</th><th>目标</th><th>方位</th><th>仰角</th><th>药包</th><th>弹种</th><th>动作</th></tr></thead><tbody id="left-slots-tbody"></tbody></table>
                </div>
                <div class="slots-box" style="border-top:3px solid var(--ref-color);">
                    <h3 style="color:var(--ref-color);">▶ 右炮计划</h3>
                    <table class="slots-table"><thead><tr><th>卡槽</th><th>目标</th><th>方位</th><th>仰角</th><th>药包</th><th>弹种</th><th>动作</th></tr></thead><tbody id="right-slots-tbody"></tbody></table>
                </div>
            </div>

            <div class="blind-sec">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="color:var(--accent);">🚨 独立高精盲射面板 (直读公里射表解算)</strong>
                    <button class="btn-slot" style="background:var(--accent); color:#000; font-weight:bold;" onclick="recordBlindSlot()">📸 锁存至盲射卡</button>
                </div>
                <div style="margin-top:8px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <label>距离:</label><input type="number" id="blind-dist" style="width:70px;" step="0.01"> km
                    <label>装药:</label><select id="blind-chg"><option value="1">1号</option><option value="2">2号</option><option value="3">3号</option><option value="4">4号</option><option value="5">5号</option><option value="6">6号</option></select>
                    <label>弹种:</label>
                    <select id="blind-type">
                        <option value="AP">AP (穿甲弹)</option><option value="HE" selected>HE (高爆弹)</option><option value="HCHE">HCHE (高装药爆破弹)</option><option value="SMOKE">SMOKE (白磷烟雾弹)</option><option value="STAR">STAR (照明星弹)</option>
                    </select>
                    <span style="font-weight:bold; color:#fff;">➔ 仰角:</span><span id="blind-output-label" style="color:var(--accent); font-size:16px; font-weight:bold;">--°</span>
                </div>
                <table class="slots-table" style="margin-top:10px;"><thead><tr><th>盲射卡槽</th><th>距离</th><th>药包</th><th>仰角</th><th>弹种</th><th>动作</th></tr></thead><tbody id="blind-slots-tbody"></tbody></table>
            </div>
        </div>
    </div>
    <footer>by战列驱逐舰poi</footer>
</div>

<script>
    const LETTERS = "ABCDEFGHIJKLMNOPQRST".split("");
    const config = { 1:{factor:12.0,max:5}, 2:{factor:6.0,max:10}, 3:{factor:4.0,max:15}, 4:{factor:3.0,max:20}, 5:{factor:2.4,max:25}, 6:{factor:2.0,max:30} };
    let gunPos=null, spotters={}, refPoints={}, targets={}, solved={}, manualAssets={}, struckTargets=new Set(), userDecisions={}, aliasMap={};
    let mapScale=1.0, mapOffX=0, mapOffY=0, isDragging=false, lastX=0, lastY=0;

    let savedSlots = { left: Array(6).fill(null), right: Array(6).fill(null), blind: Array(4).fill(null) };
    if(localStorage.getItem('iron_nest_slots_v195')) { try { savedSlots = JSON.parse(localStorage.getItem('iron_nest_slots_v195')); } catch(e){} }

    function kmToGridStr(x, y) {
        if(x<0 || y<0) return "区域外";
        let lx=Math.max(0, Math.min(19.99, x)), ly=Math.max(0, Math.min(9.99, y));
        let ix=Math.floor(lx), iy=Math.floor(ly)+1;
        let sx=Math.floor((lx-ix)*10), sy=Math.floor((ly-Math.floor(ly))*10);
        return `${LETTERS[ix]}${iy} [${sx}:${sy}]`;
    }

    function parseGrid(z, sx, sy) {
        let ix=LETTERS.indexOf(z[0].toUpperCase()), iy=parseInt(z.slice(1));
        return { x: ix + parseInt(sx)/10 + 0.05, y: iy-1 + parseInt(sy)/10 + 0.05 };
    }

    function parseClipboardText(text) {
        gunPos=null; spotters={}; refPoints={}; targets={}; 
        let clean = text.replace(/<\/?[^>]+>/g, '').replace(/：/g, ':').replace(/[\u00a0\u1680\u2000-\u200a\u2028\u2029\u202f\u205f\u3000]/g, ' ');
        let lines = clean.split('\n');
        
        lines.forEach(line => {
            let l = line.trim(); if(!l) return;
            let mGun = l.match(/(铁巢|阵地|[^\s-]+)\s*-\s*([A-T]\d+)\s+(\d+):(\d+)/i);
            if(mGun && !/Spotter|FO/i.test(mGun[1])) {
                let km = parseGrid(mGun[2],mGun[3],mGun[4]);
                gunPos = { name:mGun[1].trim(), x:km.x, y:km.y, zone:mGun[2], sx:mGun[3], sy:mGun[4] };
            }
            let mS = l.match(/(Spotter#?\d+|FO#?\d+)\s*-\s*([A-T]\d+)\s+(\d+):(\d+)/i);
            if(mS) { let km = parseGrid(mS[2], mS[3], mS[4]); spotters[mS[1]] = { x:km.x, y:km.y, zone:mS[2], sx:mS[3], sy:mS[4] }; }
            let foM = l.match(/([A-Za-z0-9_#]+)\s+(?:音频报告|发现)\s+([A-Za-z0-9_#]+)\s*:\s*([\d\.]+)(?:\s*km|\s*)\s+自\s+([A-T]\d+)\s+(\d+):(\d+)/i);
            if(foM){ let km = parseGrid(foM[4],foM[5],foM[6]); spotters[foM[1]] = { x:km.x, y:km.y, zone:foM[4], sx:foM[5], sy:foM[6] }; }
        });

        let curID = null, curType = null;
        lines.forEach(line => {
            let l = line.trim(); if(!l) return;

            let foM = l.match(/([A-Za-z0-9_#]+)\s+(?:音频报告|发现)\s+([A-Za-z0-9_#]+)\s*:\s*([\d\.]+)(?:\s*km|\s*)\s+自\s+([A-T]\d+)\s+(\d+):(\d+)/i);
            if(foM){ if(!targets[foM[2]]) targets[foM[2]] = {clues:[]}; targets[foM[2]].clues.push({type:l.includes("km")?'dis':'az', base:foM[1], val:parseFloat(foM[3])}); return; }
            let comboNewMatch = l.match(/([A-Za-z0-9_#]+)\s+已发现[。.]\s*([\d\.]+)\s*[,，]?\s*(?:距|及距离)\s*([A-Za-z0-9_#]+)\s*([\d\.]+)\s*km/i);
            if(comboNewMatch) { let tName = comboNewMatch[1].trim(); if(!targets[tName]) targets[tName] = { clues: [] }; targets[tName].clues.push({ type: 'az', base: comboNewMatch[3].trim(), val: parseFloat(comboNewMatch[2]) },{ type: 'dis', base: comboNewMatch[3].trim(), val: parseFloat(comboNewMatch[4]) }); return; }
            let doubleAzMatch = l.match(/([A-Za-z0-9_#]+)\s+已发现[。.]\s*从\s*([A-Za-z0-9_#]+)\s*方位角\s*([\d\.]+)°?\s*及从\s*([A-Za-z0-9_#]+)\s*方位角\s*([\d\.]+)°?/i);
            if(doubleAzMatch) { let tName = doubleAzMatch[1].trim(); if(!targets[tName]) targets[tName] = { clues: [] }; targets[tName].clues.push({ type: 'az', base: doubleAzMatch[2].trim(), val: parseFloat(doubleAzMatch[3]) },{ type: 'az', base: doubleAzMatch[4].trim(), val: parseFloat(doubleAzMatch[5]) }); return; }
            let directGridMatch = l.match(/([A-Za-z0-9_#]+)\s+已发现[。.]\s*坐标\s+([A-T]\d+)\s+(\d+):(\d+)/i);
            if(directGridMatch) { let tName = directGridMatch[1].trim(); let km = parseGrid(directGridMatch[2], directGridMatch[3], directGridMatch[4]); if(km) targets[tName] = { clues: [], forcedPt: km }; return; }

            let refM = l.match(/参考点\s*([A-Za-z0-9_#]+)/i);
            if(refM) { curID = refM[1].trim(); curType = 'ref'; refPoints[curID] = {clues:[]}; return; }
            
            if(/观测资产|参考点|铁巢|阵地/.test(l) && l.endsWith(':')) return;

            let idM = l.match(/^([A-Za-z0-9_#]+):/);
            if(idM) { curID = idM[1]; curType = 'tgt'; if(!targets[curID]) targets[curID]={clues:[]}; return; }

            let azM = l.match(/从\s*([A-Za-z0-9_#]+)\s*方位角\s*(\d+)°/i);
            let disM = l.match(/距\s*([A-Za-z0-9_#]+)\s*([\d\.]+)\s*km/i);
            let combo = l.match(/方位角\s*(\d+)°\s*及距离\s*([\d\.]+)\s*km/i);
            if(curID) {
                let pool = curType==='ref' ? refPoints[curID].clues : (targets[curID]?targets[curID].clues:[]);
                if(combo) { let b = azM ? azM[1].trim() : null; pool.push({type:'az',base:b,val:parseFloat(combo[1])},{type:'dis',base:b,val:parseFloat(combo[2])}); }
                else if(azM) pool.push({type:'az',base:azM[1].trim(),val:parseFloat(azM[2])});
                else if(disM) pool.push({type:'dis',base:disM[1].trim(),val:parseFloat(disM[2])});
            }
        });
    }

    function solve() {
        solved = {}; 
        for(let s in spotters) solved[s] = {x:spotters[s].x, y:spotters[s].y};
        if(gunPos) solved[gunPos.name] = {x:gunPos.x, y:gunPos.y};
        for(let k in manualAssets) solved[k] = manualAssets[k];

        let changed = true;
        for(let i=0; i<12 && changed; i++) {
            changed = false;
            let all = Object.assign({}, refPoints, targets);
            for(let id in all) {
                if(solved[id] || solved[id+"_A"]) continue;
                if(all[id].forcedPt) { solved[id]=all[id].forcedPt; changed=true; continue; }
                let res = evalClues(all[id].clues);
                if(res) {
                    if(res.isMulti) { solved[id+"_A"]=res.points[0]; solved[id+"_B"]=res.points[1]; solved[id]=res; }
                    else { solved[id]=res; }
                    changed=true;
                }
            }
        }
    }

    function evalClues(clues) {
        if(!clues || clues.length < 1) return null;
        let azs = clues.filter(c=>c.type==='az'), diss = clues.filter(c=>c.type==='dis');
        const getP = (b) => {
            if(!b) return null;
            if(userDecisions[b]) return solved[b+"_"+userDecisions[b]];
            let realB = Object.keys(solved).find(k => k.replace('#','').toLowerCase() === b.replace('#','').toLowerCase());
            if(!realB || solved[realB].isMulti) return null;
            return solved[realB] || solved[realB+"_A"];
        };

        if(azs.length>=1 && diss.length>=1) {
            let pA = getP(azs[0].base), pB = getP(diss[0].base);
            if(pA && pB) {
                let res = intersectRayAndCircle(pA, azs[0].val, pB, diss[0].val);
                if(res === "CONFLICT") return { isError: true, msg: "物理逻辑冲突/几何无解" };
                return Array.isArray(res) ? { isMulti: true, points: res } : res;
            }
        }
        if(azs.length>=2) {
            let p1=getP(azs[0].base), p2=getP(azs[1].base);
            if(p1 && p2) return intersectTwoRays(p1, azs[0].val, p2, azs[1].val);
        }
        if(diss.length>=2) {
            let p1=getP(diss[0].base), p2=getP(diss[1].base);
            if(p1 && p2) {
                let res = intersectTwoCircles(p1, diss[0].val, p2, diss[1].val);
                if(res === "CONFLICT") return { isError: true, msg: "物理逻辑冲突/几何无解" };
                return Array.isArray(res) ? { isMulti: true, points: res } : res;
            }
        }
        return null;
    }

    function intersectRayAndCircle(srcPt, az, centerPt, radius) {
        let alpha = (90 - az) * (Math.PI / 180);
        let kx = Math.cos(alpha), ky = Math.sin(alpha);
        let dx = srcPt.x - centerPt.x, dy = srcPt.y - centerPt.y;
        let b = 2 * (dx * kx + dy * ky), c = (dx * dx + dy * dy) - radius * radius;
        let delta = b * b - 4 * c;
        if (delta < 0) return "CONFLICT";
        let t1 = (-b - Math.sqrt(delta)) / 2, t2 = (-b + Math.sqrt(delta)) / 2;
        let pts = [];
        if(t1 >= 0) pts.push({ x: srcPt.x + t1 * kx, y: srcPt.y + t1 * ky });
        if(t2 >= 0) pts.push({ x: srcPt.x + t2 * kx, y: srcPt.y + t2 * ky });
        return pts.length === 0 ? "CONFLICT" : (pts.length === 2 ? pts : pts[0]);
    }

    function intersectTwoCircles(pt1, r1, pt2, r2) {
        let dx = pt2.x - pt1.x, dy = pt2.y - pt1.y;
        let d = Math.sqrt(dx * dx + dy * dy);
        if (d > r1 + r2 || d < Math.abs(r1 - r2) || d < 1e-6) return "CONFLICT";
        let a = (r1 * r1 - r2 * r2 + d * d) / (2 * d), h = Math.sqrt(Math.max(0, r1 * r1 - a * a));
        let x2 = pt1.x + (a * dx) / d, y2 = pt1.y + (a * dy) / d;
        let rx = (-dy * h) / d, ry = (dx * h) / d;
        return h < 1e-4 ? { x: x2, y: y2 } : [{ x: x2 + rx, y: y2 + ry }, { x: x2 - rx, y: y2 - ry }];
    }

    function intersectTwoRays(pt1, az1, pt2, az2) {
        let a1 = (90 - az1) * (Math.PI / 180), a2 = (90 - az2) * (Math.PI / 180);
        let kx1 = Math.cos(a1), ky1 = Math.sin(a1), kx2 = Math.cos(a2), ky2 = Math.sin(a2);
        let det = kx1 * ky2 - ky1 * kx2;
        if (Math.abs(det) < 1e-6) return null;
        let t1 = ((pt2.x - pt1.x) * ky2 - (pt2.y - pt1.y) * kx2) / det;
        return { x: pt1.x + t1 * kx1, y: pt1.y + t1 * ky1 };
    }

    function updateTerminalUI() {
        let db = document.getElementById('dashboard-container'); db.innerHTML = '';
        let sel = document.getElementById('target-selector'); let old = sel.value;
        sel.innerHTML = '<option value="">--未选定解算目标--</option>';

        if(gunPos) db.innerHTML += renderCard('gun', gunPos.name, gunPos.zone + " [" + gunPos.sx + ":" + gunPos.sy + "]");
        for(let s in spotters) db.innerHTML += renderCard('spotter', s, spotters[s].zone ? spotters[s].zone + " [" + spotters[s].sx + ":" + spotters[s].sy + "]" : kmToGridStr(spotters[s].x, spotters[s].y));
        
        let all = Object.assign({}, refPoints, targets);
        for(let id in all) {
            let pt = solved[id], isT = targets[id];
            let isStruck = struckTargets.has(id);
            let grid = pt ? (pt.isError ? `<span style="color:red">[${pt.msg}]</span>` : 
                       (pt.isMulti ? `<span style="color:var(--accent)">解A: ${kmToGridStr(pt.points[0].x, pt.points[0].y)}<br>解B: ${kmToGridStr(pt.points[1].x, pt.points[1].y)}</span>` : `<b>${kmToGridStr(pt.x, pt.y)}</b>`)) : "等待传导...";
            db.innerHTML += renderCard(isT?'tgt':'ref', id, grid, pt);
            if(pt && !pt.isError && isT && !isStruck) {
                let opt = document.createElement('option'); opt.value=id; opt.text=(aliasMap[id]||id); sel.appendChild(opt);
            }
        }
        sel.value = old; calcFire(); drawRadarMap();
    }

    function renderCard(type, id, grid, pt) {
        let isStruck = struckTargets.has(id);
        let isT = type === 'tgt'; let isR = type === 'ref';
        let titleColor = isT ? 'var(--target-color)' : (isR ? 'var(--ref-color)' : (type==='gun'?'var(--gun-color)':'var(--spotter-color)'));
        let titlePrefix = isT ? '[目标] ' : (isR ? '[参考点] ' : (type==='spotter'?'[观测资产] ':''));
        let displayName = aliasMap[id] || id;
        let btnHtml = isT ? `<button class="btn-slot" style="background:${isStruck?'#1e293b':'#7f1d1d'}" onclick="toggleStrike('${id}')">${isStruck?'恢复':'击灭'}</button>` : 
                      `<button class="btn-slot" style="background:#7f1d1d" onclick="deleteAsset('${id}')">移除</button>`;
        let renameBtn = `<button class="btn-slot" style="background:#1e293b; margin-left:5px;" onclick="renameAsset('${id}')">改名</button>`;
        let decision = (pt && pt.isMulti) ? `<div class="decision-btn-group">
            <button class="btn-decision ${userDecisions[id]==='A'?'active':''}" onclick="decide('${id}','A')">选解A</button>
            <button class="btn-decision ${userDecisions[id]==='B'?'active':''}" onclick="decide('${id}','B')">选解B</button>
        </div>` : '';
        return `<div class="node-card ${type}" style="opacity:${isStruck?0.5:1}">
            <div class="node-title" style="color:${titleColor}"><span>${titlePrefix}${displayName}</span><div>${renameBtn}${btnHtml}</div></div>
            ${grid}${decision}
        </div>`;
    }

    function renameAsset(id) { let n = prompt("输入新名字:", aliasMap[id]||id); if(n) aliasMap[id]=n; updateTerminalUI(); }
    function toggleStrike(id) { if(struckTargets.has(id)) struckTargets.delete(id); else struckTargets.add(id); updateTerminalUI(); }
    function deleteAsset(id) { delete manualAssets[id]; delete spotters[id]; delete refPoints[id]; delete targets[id]; delete solved[id]; solve(); updateTerminalUI(); }
    function decide(id, val) { userDecisions[id]=val; solve(); updateTerminalUI(); }

    function calcFire() {
        let id = document.getElementById('target-selector').value;
        if(!id || !gunPos || !solved[id]) return;
        let t = solved[id]; document.getElementById('target-grid-label').innerText = kmToGridStr(t.x, t.y);
        let dx=t.x-gunPos.x, dy=t.y-gunPos.y, dist=Math.sqrt(dx*dx+dy*dy), az=90-Math.atan2(dy,dx)*(180/Math.PI);
        if(az<0) az+=360;
        ['L','R'].forEach(s => {
            let m = parseInt(document.querySelector(`input[name="${s}-chg"]:checked`).value);
            let chg=1; if(m!==0) chg=m; else { for(let i=1;i<=6;i++) if(dist<=config[i].max){chg=i;break;} }
            let el = dist*config[chg].factor;
            let elEl = document.getElementById(`${s}-elevation`);
            if(el>60 || dist>30){ elEl.innerText="弹道崩溃"; elEl.style.color="red"; } else { elEl.innerText=el.toFixed(2)+"°"; elEl.style.color="#fff"; }
            document.getElementById(`${s}-azimuth`).innerText = "方位: "+az.toFixed(1)+"°";
            document.getElementById(`${s}-distance`).innerText = `远距: ${dist.toFixed(2)} km (${chg}号药)`;
        });
    }

    function toggleManualInputs() {
        let f = document.getElementById('manual-format').value;
        document.getElementById('manual-grid-inputs').style.display = f==='grid'?'block':'none';
        document.getElementById('manual-km-inputs').style.display = f==='km'?'block':'none';
        document.getElementById('manual-polar-inputs').style.display = f==='polar'?'block':'none';
        if(f==='polar' && document.getElementById('polar-bases-container').children.length===0) addPolarBase();
    }
    function addPolarBase() {
        let div = document.createElement('div'); div.className="manual-row";
        div.innerHTML = `<input type="text" class="p-id" placeholder="基准点"><input type="number" class="p-az" placeholder="方位°"><input type="number" class="p-dis" placeholder="距离km">`;
        document.getElementById('polar-bases-container').appendChild(div);
    }
    function injectManualAsset() {
        let id=document.getElementById('manual-id').value.trim(), f=document.getElementById('manual-format').value, type=document.getElementById('manual-type').value;
        if(!id) return;
        let pt = null;
        if(f==='grid') {
            let m=document.getElementById('manual-grid-str').value.match(/([A-T]\d+)\s+(\d+):(\d+)/i);
            if(m) pt = parseGrid(m[1],m[2],m[3]);
        } else if(f==='km') {
            pt = {x:parseFloat(document.getElementById('manual-km-x').value), y:parseFloat(document.getElementById('manual-km-y').value)};
        } else {
            let clues = [];
            document.querySelectorAll('#polar-bases-container .manual-row').forEach(row => {
                let bid=row.querySelector('.p-id').value.trim(), az=row.querySelector('.p-az').value, dis=row.querySelector('.p-dis').value;
                if(bid) {
                    let realB = Object.keys(solved).find(k => k.replace('#','').toLowerCase() === bid.replace('#','').toLowerCase());
                    if(az) clues.push({type:'az', base:realB||bid, val:parseFloat(az)});
                    if(dis) clues.push({type:'dis', base:realB||bid, val:parseFloat(dis)});
                }
            });
            if(clues.length>0) {
                if(type==='spotter') spotters[id]={clues:clues}; else if(type==='ref') refPoints[id]={clues:clues}; else targets[id]={clues:clues};
            }
        }
        if(pt) {
            if(type==='spotter') spotters[id]=pt; else if(type==='ref') refPoints[id]={forcedPt:pt}; else targets[id]={forcedPt:pt};
            manualAssets[id] = pt;
        }
        solve(); updateTerminalUI();
    }

    const canvas = document.getElementById('radarCanvas'), ctx = canvas.getContext('2d');
    function drawRadarMap() {
        ctx.save(); ctx.clearRect(0,0,380,380); ctx.translate(mapOffX, mapOffY); ctx.scale(mapScale, mapScale);
        let s = 380/20; ctx.strokeStyle="#161f30"; ctx.lineWidth=0.5/mapScale;
        for(let i=0;i<20;i++) for(let j=0;j<10;j++) {
            ctx.strokeRect(i*s, 380-(j+1)*s, s, s);
            if(mapScale>1.2) { ctx.fillStyle="rgba(100,116,139,0.2)"; ctx.font=`${6/mapScale}px Arial`; ctx.fillText(LETTERS[i]+(j+1), i*s+2, 380-j*s-2); }
        }
        const toC = p => ({x:p.x*s, y:380-p.y*s});
        if(gunPos) { 
            let c=toC(gunPos); ctx.fillStyle="#38bdf8"; ctx.beginPath(); ctx.arc(c.x,c.y,5/mapScale,0,7); ctx.fill(); 
            ctx.fillStyle="white"; ctx.font=`${10/mapScale}px Arial`; ctx.fillText(aliasMap[gunPos.name]||gunPos.name, c.x+6/mapScale, c.y);
        }
        for(let id in solved) {
            let p=solved[id]; if(!p||p.isError||p.isMulti) continue;
            let isT = targets[id.split('_')[0]]; let isR = refPoints[id.split('_')[0]];
            ctx.fillStyle = isT ? "#ef4444" : (isR ? "#34d399" : "#c084fc");
            let c=toC(p); ctx.beginPath(); ctx.arc(c.x,c.y,4/mapScale,0,7); ctx.fill();
            ctx.fillStyle="white"; ctx.font=`${9/mapScale}px Arial`; ctx.fillText(aliasMap[id]||id, c.x+5/mapScale, c.y);
        }
        ctx.restore();
    }

    canvas.onwheel = e => { e.preventDefault(); let d=e.deltaY>0?0.9:1.1; mapScale*=d; drawRadarMap(); };
    canvas.onmousedown = e => { isDragging=true; lastX=e.clientX; lastY=e.clientY; };
    window.onmousemove = e => { if(isDragging){ mapOffX+=e.clientX-lastX; mapOffY+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; drawRadarMap(); }};
    window.onmouseup = () => isDragging=false;

    function renderSlotsUI(side) {
        let tbody = document.getElementById(`${side}-slots-tbody`); tbody.innerHTML = '';
        savedSlots[side].forEach((slot, index) => {
            let tr = document.createElement('tr');
            if(slot && slot.name) {
                tr.innerHTML = `<td>#${index+1}</td><td style="color:var(--accent)"><b>${slot.name}</b></td>
                    <td><b>${slot.az}</b></td><td><b>${slot.el}</b></td><td><b style="color:#34d399">${slot.chg}</b></td>
                    <td>${slot.type}</td><td><button class="btn-slot" style="background:#7f1d1d" onclick="clearSlot('${side}',${index})">清空</button></td>`;
            } else {
                tr.innerHTML = `<td>#${index+1}</td><td colspan="5" style="color:var(--text-muted)">空置卡槽</td>
                    <td><button class="btn-slot" style="background:#1e3a8a" onclick="recordCurrentToSlot('${side}',${index})">存入</button></td>`;
            }
            tbody.appendChild(tr);
        });
    }
    function recordCurrentToSlot(side, index) {
        let id = document.getElementById('target-selector').value; if(!id) return;
        let pre = side==='left'?'L':'R';
        let el = document.getElementById(`${pre}-elevation`).innerText;
        let az = document.getElementById(`${pre}-azimuth`).innerText.replace("方位: ","");
        let distText = document.getElementById(`${pre}-distance`).innerText;
        let chg = distText.match(/\[(\d)号药\]/)?.[1] || '1';
        let type = document.getElementById(`${pre}-ammo-select`).value.split(' ')[0];
        savedSlots[side][index] = { name: (aliasMap[id]||id), az: az, el: el, chg: chg, type: type };
        localStorage.setItem('iron_nest_slots_v195', JSON.stringify(savedSlots)); renderSlotsUI(side);
    }
    function clearSlot(side, index) { savedSlots[side][index]=null; localStorage.setItem('iron_nest_slots_v195', JSON.stringify(savedSlots)); renderSlotsUI(side); }

    function runBlindCalc() {
        let d = parseFloat(document.getElementById('blind-dist').value);
        let chgSel = document.getElementById('blind-chg');
        if(!isNaN(d) && d>0) {
            if(event && event.target.id === 'blind-dist') { for(let i=1;i<=6;i++) if(d<=config[i].max){ chgSel.value=i; break; } }
            let chg = parseInt(chgSel.value);
            let el = d*config[chg].factor;
            document.getElementById('blind-output-label').innerText = (el>60||d>30)?"弹道崩溃":el.toFixed(2)+"°";
        } else document.getElementById('blind-output-label').innerText = "--°";
    }
    function recordBlindSlot() {
        let d = document.getElementById('blind-dist').value, chg = document.getElementById('blind-chg').value;
        let el = document.getElementById('blind-output-label').innerText;
        let type = document.getElementById('blind-type').value;
        if(el === '--°' || el.includes("崩溃")) return;
        let idx = savedSlots.blind.findIndex(s => !s || !s.dist); if(idx===-1) idx=0;
        savedSlots.blind[idx] = { dist:d, chg:chg, el:el, type:type };
        localStorage.setItem('iron_nest_slots_v195', JSON.stringify(savedSlots)); renderBlindSlots();
    }
    function renderBlindSlots() {
        let tbody = document.getElementById('blind-slots-tbody'); tbody.innerHTML = '';
        savedSlots.blind.forEach((s, i) => {
            let tr = document.createElement('tr');
            if(s && s.dist) tr.innerHTML = `<td>#${i+1}</td><td><b>${s.dist}</b></td><td>${s.chg}</td><td><b>${s.el}</b></td><td>${s.type}</td><td><button class="btn-slot" onclick="savedSlots.blind[${i}]=null;renderBlindSlots()">清空</button></td>`;
            else tr.innerHTML = `<td>#${i+1}</td><td colspan="4">--</td><td>--</td>`;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('clipboard-textarea').addEventListener('input', e => { parseClipboardText(e.target.value); solve(); updateTerminalUI(); });
    document.getElementById('target-selector').addEventListener('change', calcFire);
    document.querySelectorAll('input[type="radio"]').forEach(r => r.addEventListener('change', calcFire));
    document.getElementById('blind-dist').addEventListener('input', runBlindCalc);
    document.getElementById('blind-chg').addEventListener('change', runBlindCalc);
    renderSlotsUI('left'); renderSlotsUI('right'); renderBlindSlots(); updateTerminalUI();
</script>
</body>
</html>
